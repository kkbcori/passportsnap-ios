name: iOS Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-15

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm install

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Install Apple certificate and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: runner-keychain-${{ github.run_id }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$CERTIFICATE_BASE64"          | base64 --decode -o $CERT_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile using decoded XML (macOS 15 compatible)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode the profile to a plist so we can extract the UUID
          security cms -D -i $PP_PATH -o $RUNNER_TEMP/profile.plist

          # Extract UUID using PlistBuddy (more reliable than plutil pipe on macOS 15)
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" $RUNNER_TEMP/profile.plist)
          echo "Profile UUID: $PP_UUID"

          # Copy profile with UUID filename (required by Xcode)
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Installed: ~/Library/MobileDevice/Provisioning Profiles/$PP_UUID.mobileprovision"

          # Verify installation
          ls ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Write NODE_BINARY to .xcode.env.local
        run: echo "NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Set build number to ${{ github.run_number }}
        run: |
          cd ios
          agvtool new-version -all ${{ github.run_number }}

      - name: Bundle React Native JS
        run: |
          mkdir -p ios/assets
          node node_modules/.bin/react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/assets

      - name: Build & archive with Fastlane
        run: |
          cd ios
          bundle exec fastlane build
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cd ios
          bundle exec fastlane deploy
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PassportSnap-${{ github.run_number }}.ipa
          path: ios/build/PassportSnap.ipa
          retention-days: 14

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
