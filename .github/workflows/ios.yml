# .github/workflows/ios.yml
#
# PassportSnap iOS — Build & Deploy to TestFlight
#
# Triggers:
#   • Every push to `main`        → builds + uploads to TestFlight
#   • Every pull request to `main`→ builds only (no upload), confirms nothing is broken
#   • Manual trigger via GitHub UI (workflow_dispatch)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions → New secret):
#
#   CERTIFICATE_BASE64          Base64-encoded Apple Distribution .p12 certificate
#   CERTIFICATE_PASSWORD        Password for the .p12 file
#   PROVISIONING_PROFILE_BASE64 Base64-encoded .mobileprovision file
#   APP_STORE_CONNECT_KEY_ID    App Store Connect API key ID  (e.g. AB12CD34EF)
#   APP_STORE_CONNECT_ISSUER_ID App Store Connect issuer UUID
#   APP_STORE_CONNECT_KEY_BASE64 Base64-encoded .p8 API private key file
#
# See README.md → "Setting Up GitHub Secrets" for how to obtain each of these.

name: iOS Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:      # allows manual trigger from GitHub Actions tab

# Cancel any in-progress build for the same branch when a new push arrives
concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-14          # Apple Silicon Mac runner — fastest for Xcode builds

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ── 3. JS dependencies ─────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm install #ci              # ci is faster and more reliable than install in CI

      # ── 4. Ruby + Fastlane ─────────────────────────────────────────────────
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true    # caches gems between runs
          working-directory: ios

      # ── 5. CocoaPods cache ─────────────────────────────────────────────────
      # Caching Pods saves ~3 min on every run after the first
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      # ── 6. Install CocoaPods ───────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          # Suppress noisy CocoaPods warnings
          COCOAPODS_DISABLE_STATS: true

      # ── 7. Code signing ────────────────────────────────────────────────────
      # Installs the distribution certificate and provisioning profile from
      # GitHub Secrets into the macOS keychain on the runner.
      - name: Install Apple certificate and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: runner-keychain-${{ github.run_id }}
        run: |
          # Write certificate and profile to temp files
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain

          echo -n "$CERTIFICATE_BASE64"        | base64 --decode -o $CERT_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create a temporary keychain and import certificate
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i $PP_PATH | \
            plutil -extract UUID raw -)
          cp $PP_PATH \
            ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Installed provisioning profile: $PP_UUID"

      # ── 8. Bump build number ───────────────────────────────────────────────
      # Uses the GitHub Actions run number so every build has a unique build number.
      # This is required by App Store Connect — it rejects duplicate build numbers.
      - name: Set build number to ${{ github.run_number }}
        run: |
          cd ios
          agvtool new-version -all ${{ github.run_number }}

      # ── 9. Build archive ───────────────────────────────────────────────────
      - name: Build & archive with Fastlane
        run: |
          cd ios
          bundle exec fastlane build
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}

      # ── 10. Upload to TestFlight (main branch only) ─────────────────────────
      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          cd ios
          bundle exec fastlane deploy
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}

      # ── 11. Upload IPA as build artifact ───────────────────────────────────
      # Even on PRs, the IPA is available for manual download from the Actions tab
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PassportSnap-${{ github.run_number }}.ipa
          path: ios/build/PassportSnap.ipa
          retention-days: 14

      # ── 12. Clean up keychain ──────────────────────────────────────────────
      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain 2>/dev/null || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision
