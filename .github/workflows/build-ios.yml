name: iOS Build & Upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26          # ← was macos-15. macos-26 ships Xcode 26 (iOS 26 SDK)
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version

      - name: Set Xcode Toolchain
        # Required on macOS-26 runners to avoid Swift compatibility linker errors
        run: echo "TOOLCHAINS=com.apple.dt.toolchain.XcodeDefault" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          mkdir -p ios/assets
          cd ios
          pod install --repo-update

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64:        ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD:                    ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64:  ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:               ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KC_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64"      | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KC_PATH
          security set-keychain-settings -lut 21600 $KC_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KC_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A \
            -t cert -f pkcs12 -k $KC_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" $KC_PATH
          security list-keychain -d user -s $KC_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -workspace ios/PassportSnap.xcworkspace \
            -scheme PassportSnap \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PassportSnap.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            | xcbeautify

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>             <string>app-store-connect</string>
            <key>teamID</key>             <string>THN78NT3R9</string>
            <key>uploadBitcode</key>      <false/>
            <key>uploadSymbols</key>      <true/>
            <key>compileBitcode</key>     <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PassportSnap.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcbeautify

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/ipa/PassportSnap.ipa \
            --type ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --show-progress \
            --output-format xml

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true
